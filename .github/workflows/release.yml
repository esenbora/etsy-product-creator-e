name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundled dist
        run: npm run build:dist

      - name: Create release package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="etsy-product-creator-e-${VERSION}"
          rm -rf release-pack "${PACKAGE}.tar.gz"
          mkdir -p "release-pack/${PACKAGE}"

          cp -R dist "release-pack/${PACKAGE}/dist"
          cp package.json "release-pack/${PACKAGE}/package.json"
          cp -R public "release-pack/${PACKAGE}/public"
          cp -R scripts "release-pack/${PACKAGE}/scripts"
          cp .env.example "release-pack/${PACKAGE}/.env.example" || true
          cp config.example.json "release-pack/${PACKAGE}/config.example.json" || true
          cp install.sh "release-pack/${PACKAGE}/install.sh" || true
          cp install.ps1 "release-pack/${PACKAGE}/install.ps1" || true
          cp setup.sh "release-pack/${PACKAGE}/setup.sh" || true
          cp setup.ps1 "release-pack/${PACKAGE}/setup.ps1" || true
          cp launch.sh "release-pack/${PACKAGE}/launch.sh" || true
          cp launch.bat "release-pack/${PACKAGE}/launch.bat" || true
          cp fresh.ps1 "release-pack/${PACKAGE}/fresh.ps1" || true

          tar -czf "${PACKAGE}.tar.gz" -C release-pack "${PACKAGE}"

          # Tarball'da source kod (top-level server.js/create.js veya lib/*.js)
          # OLMAMALI — IP koruma. dist/ icindekiler hariç tutulur.
          if tar tzf "${PACKAGE}.tar.gz" | grep -E "^${PACKAGE}/(server\.js|create\.js|lib/)" ; then
            echo "ERROR: tarball'da kaynak dosyalar var, IP sizdiriyor."
            exit 1
          fi
          echo "OK: source files NOT in tarball (sadece dist/)"

          # Bundled dist entry'leri EKSIKSIZ olmali. Biri eksikse customer boot kirik
          # (npm run start:dist / browser:dist dosya bulamaz) — sessiz ship ETME, FAIL et.
          for f in dist/server.js dist/create.js dist/launch-browser.js; do
            if ! tar tzf "${PACKAGE}.tar.gz" | grep -qE "^${PACKAGE}/${f}$" ; then
              echo "ERROR: tarball'da ${f} eksik — boot kirik ship edilecekti. build:dist entryPoints kontrol."
              exit 1
            fi
          done
          echo "OK: dist/server.js + dist/create.js + dist/launch-browser.js mevcut"

      - name: Upload release tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="etsy-product-creator-e-${VERSION}.tar.gz"
          gh release create "${GITHUB_REF_NAME}" "${TARBALL}" --generate-notes || \
            gh release upload "${GITHUB_REF_NAME}" "${TARBALL}" --clobber
